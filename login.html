<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinSp - Login</title>
  <meta name="description" content="Login to MinSp to access AI recommendations and personalized features.">
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="./styles.css">
  <style>
    .login-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 100px);
      padding: 40px 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      margin-bottom: 24px;
      transition: opacity 0.2s;
    }

    .login-back:hover {
      opacity: 0.8;
    }

    .login-card {
      background: linear-gradient(135deg, rgba(12, 22, 40, 0.92) 0%, rgba(8, 16, 32, 0.96) 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(87, 184, 255, 0.06);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0 0 8px;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-header p {
      font-size: 0.95rem;
      color: var(--text-soft);
      margin: 0;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-form-group label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .login-form-group input {
      padding: 14px 16px;
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .login-form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(87, 184, 255, 0.1);
    }

    .login-form-group input::placeholder {
      color: var(--text-faint);
    }

    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, #3ba8e8 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(87, 184, 255, 0.3);
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(87, 184, 255, 0.4);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-features {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .login-features h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 16px;
    }

    .login-features ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .login-features li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .login-features li::before {
      content: '✓';
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: rgba(87, 184, 255, 0.2);
      border-radius: 50%;
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .login-error {
      display: none;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #ef4444;
      font-size: 0.9rem;
      text-align: center;
    }

    .login-error.show {
      display: block;
    }

    .login-success {
      display: none;
      padding: 12px 16px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 12px;
      color: #22c55e;
      font-size: 0.9rem;
      text-align: center;
    }

    .login-success.show {
      display: block;
    }

    .login-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
    }

    .login-tab {
      flex: 1;
      padding: 10px 16px;
      background: transparent;
      border: none;
      border-radius: 10px;
      color: var(--text-soft);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .login-tab.active {
      background: rgba(87, 184, 255, 0.15);
      color: var(--accent);
    }

    .login-tab:hover:not(.active) {
      color: var(--text);
    }

    .login-form-section {
      display: none;
    }

    .login-form-section.active {
      display: block;
    }

    .login-switch-text {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .login-switch-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body class="theme-tech">
  <div class="login-page">
    <div class="login-container">
      <a href="index.html" class="login-back">← Back to home</a>

      <div class="login-card">
        <div class="login-header">
          <h1>Welcome to MinSp</h1>
          <p>Sign in to unlock personalized features</p>
        </div>

        <div class="login-tabs">
          <button type="button" class="login-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button type="button" class="login-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
        </div>

        <div class="login-error" id="login-error"></div>
        <div class="login-success" id="login-success"></div>

        <!-- Login Form -->
        <div class="login-form-section active" id="section-login">
          <form class="login-form" id="login-form">
            <div class="login-form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" name="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="login-form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="login-btn">
              Sign In
            </button>
          </form>
        </div>

        <!-- Register Form -->
        <div class="login-form-section" id="section-register">
          <form class="login-form" id="register-form">
            <div class="login-form-group">
              <label for="register-pseudo">Username</label>
              <input type="text" id="register-pseudo" name="pseudo" placeholder="Choose a username" required autocomplete="username">
            </div>
            <div class="login-form-group">
              <label for="register-email">Email</label>
              <input type="email" id="register-email" name="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="login-form-group">
              <label for="register-password">Password</label>
              <input type="password" id="register-password" name="password" placeholder="Create a password (min 6 chars)" required autocomplete="new-password" minlength="6">
            </div>
            <button type="submit" class="login-btn" id="register-btn">
              Create Account
            </button>
          </form>
        </div>

        <div class="login-features">
          <h3>✨ Member Benefits</h3>
          <ul>
            <li>AI-powered mouse recommendations</li>
            <li>Save favorites across sessions</li>
            <li>Personalized comparison lists</li>
            <li>Early access to new features</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    // User Authentication System (from app.js - full featured)
    var UserAuth = (function() {
      var STORAGE_KEY = 'users';
      var SESSION_KEY = 'currentUser';

      function getUsers() {
        try {
          var data = localStorage.getItem(STORAGE_KEY);
          if (!data) return [];
          var parsed = JSON.parse(data);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function saveUsers(users) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
      }

      function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
      }

      function register(pseudo, email, password) {
        if (!pseudo || !pseudo.trim() || !email || !email.trim() || !password || !password.trim()) {
          return { success: false, error: 'empty_fields', message: 'Please fill in all fields' };
        }
        if (password.length < 6) {
          return { success: false, error: 'password_too_short', message: 'Password must be at least 6 characters' };
        }
        var users = getUsers();
        if (users.some(function(u) { return u.email === email.trim().toLowerCase(); })) {
          return { success: false, error: 'email_exists', message: 'This email is already registered' };
        }
        if (users.some(function(u) { return u.pseudo === pseudo.trim(); })) {
          return { success: false, error: 'pseudo_exists', message: 'This username is already taken' };
        }
        var newUser = {
          id: generateId(),
          pseudo: pseudo.trim(),
          email: email.trim().toLowerCase(),
          password: password
        };
        users.push(newUser);
        saveUsers(users);
        return { success: true, message: 'Account created successfully!' };
      }

      function login(email, password) {
        if (!email || !email.trim() || !password || !password.trim()) {
          return { success: false, error: 'empty_fields', message: 'Please enter both email and password' };
        }
        var users = getUsers();
        var user = users.find(function(u) {
          return u.email === email.trim().toLowerCase() && u.password === password;
        });
        if (!user) {
          return { success: false, error: 'invalid_credentials', message: 'Invalid email or password' };
        }
        var session = {
          id: user.id,
          pseudo: user.pseudo,
          email: user.email
        };
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        return { success: true, user: session, message: 'Welcome back, ' + user.pseudo + '!' };
      }

      function logout() {
        localStorage.removeItem(SESSION_KEY);
      }

      function getCurrentUser() {
        try {
          var data = localStorage.getItem(SESSION_KEY);
          return data ? JSON.parse(data) : null;
        } catch (e) {
          return null;
        }
      }

      return {
        register: register,
        login: login,
        logout: logout,
        getCurrentUser: getCurrentUser
      };
    })();

    // UI Logic
    (function() {
      var loginForm = document.getElementById('login-form');
      var registerForm = document.getElementById('register-form');
      var loginBtn = document.getElementById('login-btn');
      var registerBtn = document.getElementById('register-btn');
      var errorDiv = document.getElementById('login-error');
      var successDiv = document.getElementById('login-success');

      // Check if already logged in
      var currentUser = UserAuth.getCurrentUser();
      if (currentUser) {
        var returnUrl = new URLSearchParams(window.location.search).get('return') || 'index.html';
        window.location.href = returnUrl;
        return;
      }

      // Check mode parameter for initial tab
      var urlParams = new URLSearchParams(window.location.search);
      var mode = urlParams.get('mode');
      if (mode === 'register') {
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('section-login').classList.remove('active');
        document.getElementById('tab-register').classList.add('active');
        document.getElementById('section-register').classList.add('active');
      }

      function showError(message) {
        successDiv.classList.remove('show');
        errorDiv.textContent = message;
        errorDiv.classList.add('show');
        setTimeout(function() {
          errorDiv.classList.remove('show');
        }, 5000);
      }

      function showSuccess(message) {
        errorDiv.classList.remove('show');
        successDiv.textContent = message;
        successDiv.classList.add('show');
      }

      function redirectAfterLogin() {
        var returnUrl = new URLSearchParams(window.location.search).get('return') || 'index.html';
        setTimeout(function() {
          window.location.href = returnUrl;
        }, 1000);
      }

      // Tab switching
      window.switchTab = function(tab) {
        document.querySelectorAll('.login-tab').forEach(function(t) {
          t.classList.remove('active');
        });
        document.querySelectorAll('.login-form-section').forEach(function(s) {
          s.classList.remove('active');
        });
        
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('section-' + tab).classList.add('active');
        
        // Clear messages
        errorDiv.classList.remove('show');
        successDiv.classList.remove('show');
      };

      // Login
      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        var email = document.getElementById('login-email').value.trim();
        var password = document.getElementById('login-password').value;

        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        var result = UserAuth.login(email, password);

        if (result.success) {
          showSuccess(result.message);
          redirectAfterLogin();
        } else {
          showError(result.message);
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In';
        }
      });

      // Register
      registerForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        var pseudo = document.getElementById('register-pseudo').value.trim();
        var email = document.getElementById('register-email').value.trim();
        var password = document.getElementById('register-password').value;

        registerBtn.disabled = true;
        registerBtn.textContent = 'Creating account...';

        var result = UserAuth.register(pseudo, email, password);

        if (result.success) {
          showSuccess(result.message + ' Please sign in.');
          setTimeout(function() {
            switchTab('login');
            document.getElementById('login-email').value = email;
            registerBtn.disabled = false;
            registerBtn.textContent = 'Create Account';
            registerForm.reset();
          }, 1500);
        } else {
          showError(result.message);
          registerBtn.disabled = false;
          registerBtn.textContent = 'Create Account';
        }
      });
    })();
  </script>
</body>
</html>
